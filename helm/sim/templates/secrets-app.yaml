{{- if and .Values.app.enabled (include "sim.createAppSecrets" .) }}
{{/*
Secret for app credentials. Contains every sensitive key discovered in
.Values.app.env and .Values.realtime.env so that downstream deployments
can mount the secret via envFrom and never receive plaintext secret
values through container env.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sim.fullname" . }}-app-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sim.app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $appPart := include "sim.partitionEnv" (.Values.app.env | default dict) | fromJson }}
  {{- $rtPart := include "sim.partitionEnv" (.Values.realtime.env | default dict) | fromJson }}
  {{- $merged := merge (dict) ($rtPart.sensitive | default dict) ($appPart.sensitive | default dict) }}
  {{- range $key, $value := $merged }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}

{{- if and .Values.app.enabled (include "sim.createAppSecrets" .) }}
{{/*
Secret for app + realtime env. Every key in .Values.app.env and
.Values.realtime.env is written here and mounted via envFrom on the
respective Deployments. Chart-computed values (DATABASE_URL,
SOCKET_SERVER_URL, OLLAMA_URL) are omitted — they're injected as inline
env on the container so they reflect chart-time resolution.

Treating all env values as secret-grade avoids maintaining a sensitivity
classifier and prevents accidental leaks when new provider keys are added.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sim.fullname" . }}-app-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sim.app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $chartComputed := list "DATABASE_URL" "SOCKET_SERVER_URL" "OLLAMA_URL" }}
  {{- /*
    Sprig `merge` keeps the FIRST source's value on key collision. Listing
    app.env first makes app.env authoritative for shared keys (e.g.
    BETTER_AUTH_SECRET, BETTER_AUTH_URL) — both pods mount this Secret via
    envFrom, so the app container must not be silently overwritten by a
    realtime-side value.
  */}}
  {{- $merged := merge (dict) (.Values.app.env | default dict) (.Values.realtime.env | default dict) }}
  {{- range $key, $value := $merged }}
  {{- if not (has $key $chartComputed) }}
  {{- if and (ne (toString $value) "") (ne (toString $value) "<nil>") }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}

name: Publish CLI Package

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'

permissions:
  contents: read

jobs:
  publish-npm:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            **/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: packages/cli
        run: bun install --frozen-lockfile

      - name: Build package
        working-directory: packages/cli
        run: bun run build

      - name: Get package version
        id: package_version
        working-directory: packages/cli
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version already exists
        id: version_check
        run: |
          if npm view simstudio@${{ steps.package_version.outputs.version }} version &> /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.exists == 'false'
        working-directory: packages/cli
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Log skipped publish
        if: steps.version_check.outputs.exists == 'true'
        run: echo "Skipped publishing because version ${{ steps.package_version.outputs.version }} already exists on npm" 
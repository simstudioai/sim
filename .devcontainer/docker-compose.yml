services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - bun-cache:/home/bun/.bun/cache:delegated
    command: sleep infinity
    deploy:
      resources:
        limits:
          memory: 8G
    # Secrets and app config come from apps/sim/.env (single source of truth).
    # Only container-network/infra values are set here.
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/simstudio
      - BUN_INSTALL_CACHE_DIR=/home/bun/.bun/cache
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "12000:3000"
      - "12009:3003"
    working_dir: /workspace

  realtime:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - bun-cache:/home/bun/.bun/cache:delegated
    command: sleep infinity
    deploy:
      resources:
        limits:
          memory: 1G
    # Secrets and app config come from apps/realtime/.env (single source of truth).
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/simstudio
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "12001:3002"
    working_dir: /workspace

  migrations:
    build:
      context: ..
      dockerfile: docker/db.Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/simstudio
    depends_on:
      db:
        condition: service_healthy
    command: ['bun', 'run', 'db:migrate']
    restart: 'no'

  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=simstudio
    ports:
      - "${POSTGRES_PORT:-12002}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  bun-cache:

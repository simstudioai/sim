services:
  simstudio:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    ports:
      - '3000:3000'
    deploy:
      resources:
        limits:
          memory: 8G
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-simstudio}
      - BETTER_AUTH_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-dev-secret-at-least-32-characters-long}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev-encryption-key-at-least-32-chars}
      - API_ENCRYPTION_KEY=${API_ENCRYPTION_KEY:-}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-dev-internal-api-secret-min-32-chars}
      - REDIS_URL=${REDIS_URL:-}
      - COPILOT_API_KEY=${COPILOT_API_KEY}
      - SIM_AGENT_API_URL=${SIM_AGENT_API_URL}
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}
      - SOCKET_SERVER_URL=${SOCKET_SERVER_URL:-http://realtime:3002}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-}
      - APP_PUBLIC_ORIGIN=${APP_PUBLIC_ORIGIN:-http://apps.localhost:3005}
      - NEXT_PUBLIC_APP_PUBLIC_ORIGIN=${NEXT_PUBLIC_APP_PUBLIC_ORIGIN:-http://apps.localhost:3005}
      - APPS_PROXY_HOP_SECRET=${APPS_PROXY_HOP_SECRET:-dev-apps-proxy-hop-secret-min-32-chars}
      - APPS_ABUSE_TOKEN_SECRET=${APPS_ABUSE_TOKEN_SECRET:-dev-apps-abuse-token-secret-min-32-chars}
      - APPS_ALLOW_FIXTURE_BUILDS=${APPS_ALLOW_FIXTURE_BUILDS:-true}
      - APPS_ARTIFACT_ROOT=/app/.artifacts
    volumes:
      - apps_artifacts:/app/.artifacts
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      realtime:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:3000']
      interval: 90s
      timeout: 5s
      retries: 3
      start_period: 10s

  realtime:
    build:
      context: .
      dockerfile: docker/realtime.Dockerfile
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-simstudio}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-dev-secret-at-least-32-characters-long}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-dev-internal-api-secret-min-32-chars}
      - REDIS_URL=${REDIS_URL:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '3002:3002'
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:3002/health']
      interval: 90s
      timeout: 5s
      retries: 3
      start_period: 10s

  migrations:
    build:
      context: .
      dockerfile: docker/db.Dockerfile
    working_dir: /app/packages/db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-simstudio}
    depends_on:
      db:
        condition: service_healthy
    command: ['bun', 'run', 'db:migrate']
    restart: 'no'

  # Full-stack Apps static host + action reverse proxy (distinct hostname).
  # Map apps.localhost → 127.0.0.1 in /etc/hosts (or use a local DNS helper).
  apps-host:
    image: oven/bun:1.3
    working_dir: /app/apps/apps-host
    volumes:
      - ./apps/apps-host:/app/apps/apps-host
      - apps_artifacts:/app/.artifacts
    command: ['bun', 'run', 'src/server.ts']
    ports:
      - '3005:3005'
    environment:
      - APPS_HOST_PORT=3005
      - APPS_INTERNAL_GATEWAY_URL=${APPS_INTERNAL_GATEWAY_URL:-http://simstudio:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://sim.localhost:3000}
      - APPS_PROXY_HOP_SECRET=${APPS_PROXY_HOP_SECRET:-dev-apps-proxy-hop-secret-min-32-chars}
      - APP_PUBLIC_ORIGIN=${APP_PUBLIC_ORIGIN:-http://apps.localhost:3005}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://sim.localhost:3000}
      - APPS_ARTIFACT_ROOT=/app/.artifacts
    depends_on:
      simstudio:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg17
    restart: always
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-simstudio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  apps_artifacts:

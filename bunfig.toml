[install]
exact = true
# Supply-chain gate: only install package versions published at least 7 days ago
# (blocks freshly published, potentially compromised releases).
minimumReleaseAge = 604800
# @typescript/native-preview stays excluded permanently: it only publishes nightly
# dev builds, so every version is structurally younger than any age gate.
# next@16.3.0-preview.6 and its lockstep companions @next/env + the @next/swc-*
# platform binaries (all published 2026-07-13) were adopted deliberately for the
# memory-pressure fixes; they age out of the gate on 2026-07-20 — drop these
# entries after that. The swc binaries must be listed too: they are optional deps
# of next, and the age gate skips blocked optional deps silently, leaving a stale
# mismatched compiler binary on disk.
minimumReleaseAgeExcludes = [
  "@typescript/native-preview",
  "next",
  "@next/env",
  "@next/swc-darwin-arm64",
  "@next/swc-darwin-x64",
  "@next/swc-linux-arm64-gnu",
  "@next/swc-linux-arm64-musl",
  "@next/swc-linux-x64-gnu",
  "@next/swc-linux-x64-musl",
  "@next/swc-win32-arm64-msvc",
  "@next/swc-win32-x64-msvc",
]

[run]
env = { NEXT_PUBLIC_APP_URL = "http://localhost:3000" }
